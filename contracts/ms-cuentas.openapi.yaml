openapi: 3.0.3
info:
  title: MS Cuentas API
  description: >-
    Microservicio de Cuentas y Movimientos — Prueba técnica Devsu (versión .NET).
    Gestiona Cuentas y Movimientos (F1), la lógica de saldos (F2), la validación
    de "Saldo no disponible" (F3, HTTP 422) y el reporte de Estado de Cuenta (F4).
    Mantiene una réplica local de Clientes sincronizada de forma asíncrona
    (RabbitMQ) desde ms-clientes.


    Diseño de dominio bancario: las operaciones sensibles están separadas. El
    estado de la cuenta (habilitar/inhabilitar) se cambia por un endpoint propio
    y auditable. El ledger de movimientos es inmutable: solo la descripción
    (metadato) es editable; valor, saldo y fecha no se modifican.
  version: 2.0.0
  contact:
    name: John Fredy Quimbaya
servers:
  - url: http://localhost:8091
    description: Local (puerto host del microservicio ms-cuentas .NET)

tags:
  - name: Cuentas
    description: Operaciones CRU sobre cuentas (F1)
  - name: Movimientos
    description: Registro y consulta de movimientos (F1, F2, F3)
  - name: Reportes
    description: Reporte de estado de cuenta (F4)

# Todos los endpoints (salvo health/swagger) requieren un Bearer JWT de Keycloak.
security:
  - bearerAuth: []

paths:
  # ---------------------------------------------------------------- CUENTAS
  /api/cuentas:
    get:
      tags: [Cuentas]
      summary: Listar cuentas
      operationId: listarCuentas
      parameters:
        - name: clienteId
          in: query
          required: false
          description: Filtro opcional por cliente
          schema: { type: string }
      responses:
        '200':
          description: Lista de cuentas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CuentaResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Cuentas]
      summary: Crear cuenta
      operationId: crearCuenta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CuentaRequest'
            example:
              numeroCuenta: "478758"
              tipoCuenta: AHORRO
              saldoInicial: 2000
              estado: true
              clienteId: jlema
      responses:
        '201':
          description: Cuenta creada
          headers:
            Location:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CuentaResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: El cliente referenciado no existe (réplica local)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/cuentas/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Cuentas]
      summary: Obtener cuenta por id
      operationId: obtenerCuenta
      responses:
        '200':
          description: Cuenta encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CuentaResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Cuentas]
      summary: Actualizar los datos editables de una cuenta (tipo)
      description: >-
        Solo el tipo de cuenta es editable. El estado tiene su propio endpoint
        (PATCH /estado); número, saldos y cliente no se editan a mano.
      operationId: actualizarCuenta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActualizarCuentaRequest'
      responses:
        '200':
          description: Cuenta actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CuentaResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/cuentas/{id}/estado:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    patch:
      tags: [Cuentas]
      summary: Habilitar o inhabilitar una cuenta
      description: Operación sensible y auditada. Solo cambia el estado de la cuenta.
      operationId: cambiarEstadoCuenta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CambiarEstadoCuentaRequest'
            example:
              estado: false
      responses:
        '200':
          description: Estado actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CuentaResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ------------------------------------------------------------ MOVIMIENTOS
  /api/movimientos:
    get:
      tags: [Movimientos]
      summary: Listar movimientos
      operationId: listarMovimientos
      parameters:
        - name: numeroCuenta
          in: query
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Lista de movimientos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MovimientoResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Movimientos]
      summary: Registrar movimiento (F2/F3)
      description: >-
        Registra un movimiento sobre una cuenta. El valor puede ser positivo
        (depósito) o negativo (retiro), distinto de cero. Se actualiza el saldo
        disponible y se crea el asiento, de forma atómica. Si el retiro supera el
        saldo disponible se devuelve 422 con "Saldo no disponible".
      operationId: registrarMovimiento
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MovimientoRequest'
            examples:
              deposito:
                summary: Depósito de 600
                value: { numeroCuenta: "225487", valor: 600 }
              retiro:
                summary: Retiro de 575
                value: { numeroCuenta: "478758", valor: -575 }
      responses:
        '201':
          description: Movimiento registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovimientoResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Saldo no disponible (F3)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                timestamp: "2022-02-10T10:15:30Z"
                status: 422
                error: Unprocessable Entity
                message: Saldo no disponible
                path: /api/movimientos

  /api/movimientos/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Movimientos]
      summary: Obtener movimiento por id
      operationId: obtenerMovimiento
      responses:
        '200':
          description: Movimiento encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovimientoResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Movimientos]
      summary: Editar la descripción de un movimiento
      description: >-
        El ledger es inmutable: solo la descripción (metadato) es editable. El
        valor, el saldo y la fecha no se modifican.
      operationId: actualizarMovimiento
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActualizarMovimientoRequest'
      responses:
        '200':
          description: Movimiento actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovimientoResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------------------------------------------------------------- REPORTES
  /api/reportes:
    get:
      tags: [Reportes]
      summary: Estado de cuenta por rango de fechas y cliente (F4)
      operationId: estadoDeCuenta
      parameters:
        - name: fechaInicio
          in: query
          required: true
          description: Fecha inicial del rango (yyyy-MM-dd)
          schema: { type: string, format: date, example: "2022-02-01" }
        - name: fechaFin
          in: query
          required: true
          description: Fecha final del rango (yyyy-MM-dd)
          schema: { type: string, format: date, example: "2022-02-28" }
        - name: cliente
          in: query
          required: true
          description: clienteId del cliente a reportar
          schema: { type: string, example: mmontalvo }
      responses:
        '200':
          description: Reporte en formato JSON
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReporteEstadoCuenta'
              example:
                - Fecha: "10/2/2022"
                  Cliente: Marianela Montalvo
                  "Numero Cuenta": "225487"
                  Tipo: Corriente
                  "Saldo Inicial": 100
                  Estado: true
                  Movimiento: 600
                  "Saldo Disponible": 700
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT emitido por Keycloak (realm internos-dev).

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64

  responses:
    BadRequest:
      description: Datos de entrada inválidos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Token ausente, inválido o expirado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflicto — número de cuenta ya existe
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    TipoCuenta:
      type: string
      enum: [AHORRO, CORRIENTE]

    TipoMovimiento:
      type: string
      description: Derivado del signo del valor
      enum: [DEPOSITO, RETIRO]

    CuentaRequest:
      type: object
      required: [numeroCuenta, tipoCuenta, saldoInicial, estado, clienteId]
      properties:
        numeroCuenta:
          type: string
          description: Número de cuenta. Único.
          maxLength: 20
          example: "478758"
        tipoCuenta:
          $ref: '#/components/schemas/TipoCuenta'
        saldoInicial:
          type: number
          format: double
          minimum: 0
          example: 2000
        estado:
          type: boolean
          example: true
        clienteId:
          type: string
          description: clienteId dueño de la cuenta (validado contra la réplica local)
          maxLength: 50
          example: jlema

    ActualizarCuentaRequest:
      type: object
      description: Único campo editable de la cuenta (el estado va aparte)
      required: [tipoCuenta]
      properties:
        tipoCuenta:
          $ref: '#/components/schemas/TipoCuenta'

    CambiarEstadoCuentaRequest:
      type: object
      required: [estado]
      properties:
        estado:
          type: boolean
          example: false

    CuentaResponse:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        numeroCuenta: { type: string, example: "478758" }
        tipoCuenta: { $ref: '#/components/schemas/TipoCuenta' }
        saldoInicial: { type: number, format: double, example: 2000 }
        saldoDisponible:
          type: number
          format: double
          description: Saldo actual tras los movimientos
          example: 1425
        estado: { type: boolean, example: true }
        clienteId: { type: string, example: jlema }

    MovimientoRequest:
      type: object
      required: [numeroCuenta, valor]
      properties:
        numeroCuenta:
          type: string
          maxLength: 20
          example: "478758"
        valor:
          type: number
          format: double
          description: Positivo = depósito, negativo = retiro. Distinto de cero.
          example: -575

    ActualizarMovimientoRequest:
      type: object
      description: Solo la descripción es editable (ledger inmutable)
      properties:
        descripcion:
          type: string
          maxLength: 255
          example: ajuste manual

    MovimientoResponse:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        fecha: { type: string, format: date-time, example: "2022-02-10T10:15:30Z" }
        tipoMovimiento: { $ref: '#/components/schemas/TipoMovimiento' }
        valor: { type: number, format: double, example: -575 }
        saldo:
          type: number
          format: double
          description: Saldo disponible resultante tras el movimiento
          example: 1425
        numeroCuenta: { type: string, example: "478758" }
        descripcion: { type: string, nullable: true, example: ajuste manual }

    ReporteEstadoCuenta:
      type: object
      description: >-
        Fila del reporte de estado de cuenta. Las claves JSON respetan
        exactamente el ejemplo del enunciado (capitalizadas, con espacios).
      properties:
        Fecha: { type: string, example: "10/2/2022" }
        Cliente: { type: string, example: Marianela Montalvo }
        "Numero Cuenta": { type: string, example: "225487" }
        Tipo: { type: string, example: Corriente }
        "Saldo Inicial": { type: number, example: 100 }
        Estado: { type: boolean, example: true }
        Movimiento: { type: number, example: 600 }
        "Saldo Disponible": { type: number, example: 700 }

    ErrorResponse:
      type: object
      properties:
        timestamp: { type: string, format: date-time }
        status: { type: integer, example: 422 }
        error: { type: string, example: Unprocessable Entity }
        message: { type: string, example: Saldo no disponible }
        path: { type: string, example: /api/movimientos }
